<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#003366"/>
  
  <!-- Accent circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#007bff" stroke-width="3"/>
  
  <!-- Ledger/Book icon -->
  <g transform="translate(100, 100)">
    <!-- Left page -->
    <rect x="-45" y="-35" width="40" height="60" fill="#eef6ff" stroke="#007bff" stroke-width="2" rx="2"/>
    
    <!-- Right page -->
    <rect x="5" y="-35" width="40" height="60" fill="#ffffff" stroke="#007bff" stroke-width="2" rx="2"/>
    
    <!-- Binding spine -->
    <line x1="-5" y1="-35" x2="-5" y2="25" stroke="#007bff" stroke-width="2"/>
    
    <!-- Grid lines for data (left page) -->
    <line x1="-40" y1="-20" x2="-15" y2="-20" stroke="#007bff" stroke-width="1.5" opacity="0.6"/>
    <line x1="-40" y1="-8" x2="-15" y2="-8" stroke="#007bff" stroke-width="1.5" opacity="0.6"/>
    <line x1="-40" y1="4" x2="-15" y2="4" stroke="#007bff" stroke-width="1.5" opacity="0.6"/>
    <line x1="-40" y1="16" x2="-15" y2="16" stroke="#007bff" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Grid lines for data (right page) -->
    <line x1="10" y1="-20" x2="35" y2="-20" stroke="#003366" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="-8" x2="35" y2="-8" stroke="#003366" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="4" x2="35" y2="4" stroke="#003366" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="16" x2="35" y2="16" stroke="#003366" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Dollar sign accent -->
    <text x="0" y="32" font-size="18" font-weight="bold" fill="#007bff" text-anchor="middle">$</text>
  </g>
</svg>